name: Release

on:
  push:
    branches:
      - main
    paths:
      - Directory.Build.props
  workflow_dispatch:
    inputs:
      force_release:
        description: Bypass version-bump validation and run the release manually.
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  validate:
    runs-on: windows-latest
    outputs:
      should_release: ${{ steps.version_gate.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Fetch full history so multi-commit pushes can diff against github.event.before.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Verify version bump
        id: version_gate
        shell: pwsh
        env:
          MANUAL_FORCE_RELEASE: ${{ github.event_name == 'workflow_dispatch' && inputs.force_release }}
          PUSH_BEFORE: ${{ github.event.before }}
        run: |
          $manualForceRelease = "$env:MANUAL_FORCE_RELEASE".Trim().ToLowerInvariant() -eq 'true'
          if ($manualForceRelease) {
            "should_release=true" >> $env:GITHUB_OUTPUT
            Write-Host 'Manual workflow_dispatch run requested with force_release=true. Skipping version-bump validation.'
            exit 0
          }

          $baseRef = $env:PUSH_BEFORE
          if ([string]::IsNullOrWhiteSpace($baseRef) -or $baseRef -match '^0+$') {
            $baseRef = (git rev-parse HEAD^).Trim()
          }

          if ([string]::IsNullOrWhiteSpace($baseRef)) {
            throw 'Unable to determine the previous commit for version comparison.'
          }

          $changedFiles = @(git diff --name-only $baseRef HEAD)
          if (-not ($changedFiles -contains 'Directory.Build.props')) {
            throw 'Release runs require a Directory.Build.props version change.'
          }

          $currentProps = [xml](Get-Content Directory.Build.props)
          $previousHasProps = $true

          git cat-file -e "${baseRef}:Directory.Build.props" 2>$null
          if ($LASTEXITCODE -ne 0) {
            $previousHasProps = $false
          }

          $previousProps = $null
          if ($previousHasProps) {
            $previousPropsText = git show "${baseRef}:Directory.Build.props"
            if ([string]::IsNullOrWhiteSpace($previousPropsText)) {
              throw 'Unable to load Directory.Build.props from the previous commit.'
            }

            $previousProps = [xml]$previousPropsText
          }

          function Get-VersionValue([xml]$xmlDocument) {
            $value = $xmlDocument.Project.PropertyGroup.Version | Select-Object -First 1
            if ([string]::IsNullOrWhiteSpace($value)) {
              throw 'Directory.Build.props must define a Version property.'
            }

            return $value.Trim()
          }

          function Parse-Version([string]$value) {
            $match = [regex]::Match($value, '^(\d+)\.(\d+)\.(\d+)(?:[-+].*)?$')
            if (-not $match.Success) {
              throw "Invalid semantic version: $value"
            }

            return [version]::new(
              [int]$match.Groups[1].Value,
              [int]$match.Groups[2].Value,
              [int]$match.Groups[3].Value)
          }

          $currentVersion = Get-VersionValue $currentProps
          $previousVersion = if ($previousHasProps) { Get-VersionValue $previousProps } else { $null }
          $shouldRelease = $true

          $existingReleaseTags = @(git ls-remote --tags origin "refs/tags/v*")
          $isFirstRelease = $existingReleaseTags.Count -eq 0

          if (-not $isFirstRelease) {
            if (-not $previousHasProps) {
              throw 'Directory.Build.props must exist in the previous commit once releases already exist.'
            }

            if ($currentVersion -eq $previousVersion) {
              $shouldRelease = $false
            }
            elseif ((Parse-Version $currentVersion) -le (Parse-Version $previousVersion)) {
              throw "Version must increase for a release. Current=$currentVersion Previous=$previousVersion"
            }
          }

          "should_release=$($shouldRelease.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT

          if (-not $shouldRelease) {
            Write-Host "Directory.Build.props changed without a version bump. Skipping release."
          }
          elseif ($isFirstRelease) {
            Write-Host "Validated initial release version $currentVersion"
          }
          else {
            Write-Host "Validated version bump $previousVersion -> $currentVersion"
          }

      - name: Test solution
        run: dotnet test Pop.sln --configuration Release

  release:
    needs: validate
    if: ${{ needs.validate.outputs.should_release == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Read release metadata
        id: meta
        shell: pwsh
        run: |
          $json = dotnet msbuild -nologo `
            -getProperty:Version `
            -getProperty:PopVelopackVersion `
            -getProperty:PopVelopackPackId `
            -getProperty:PopPublishRuntimeIdentifier `
            -getProperty:RepositoryUrl `
            -getProperty:PopUpdateFeedBranch `
            -getProperty:PopUpdateFeedPath `
            -getProperty:Product `
            -getProperty:Authors `
            .\src\Pop.App.Windows\Pop.App.Windows.csproj | ConvertFrom-Json

          "version=$($json.Properties.Version)" >> $env:GITHUB_OUTPUT
          "velopack_version=$($json.Properties.PopVelopackVersion)" >> $env:GITHUB_OUTPUT
          "pack_id=$($json.Properties.PopVelopackPackId)" >> $env:GITHUB_OUTPUT
          "runtime=$($json.Properties.PopPublishRuntimeIdentifier)" >> $env:GITHUB_OUTPUT
          "repo_url=$($json.Properties.RepositoryUrl)" >> $env:GITHUB_OUTPUT
          "update_feed_branch=$($json.Properties.PopUpdateFeedBranch)" >> $env:GITHUB_OUTPUT
          "update_feed_path=$($json.Properties.PopUpdateFeedPath)" >> $env:GITHUB_OUTPUT
          "product=$($json.Properties.Product)" >> $env:GITHUB_OUTPUT
          "authors=$($json.Properties.Authors)" >> $env:GITHUB_OUTPUT

      - name: Install Velopack CLI
        shell: pwsh
        run: |
          dotnet tool install --global vpk --version ${{ steps.meta.outputs.velopack_version }}
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Publish app
        shell: pwsh
        run: |
          $publishDir = Join-Path $PWD 'artifacts\publish'
          $releaseDir = Join-Path $PWD 'artifacts\Releases'

          if (Test-Path $publishDir) {
            Remove-Item $publishDir -Recurse -Force
          }

          if (Test-Path $releaseDir) {
            Remove-Item $releaseDir -Recurse -Force
          }

          dotnet publish .\src\Pop.App.Windows\Pop.App.Windows.csproj `
            --configuration Release `
            --runtime ${{ steps.meta.outputs.runtime }} `
            --self-contained true `
            --output $publishDir

      - name: Pack installer
        shell: pwsh
        run: |
          vpk pack `
            --packId "${{ steps.meta.outputs.pack_id }}" `
            --packVersion "${{ steps.meta.outputs.version }}" `
            --packDir .\artifacts\publish `
            --mainExe Pop.App.exe `
            --packTitle "${{ steps.meta.outputs.product }}" `
            --packAuthors "${{ steps.meta.outputs.authors }}" `
            --runtime "${{ steps.meta.outputs.runtime }}" `
            --channel win `
            --noPortable `
            --outputDir .\artifacts\Releases

          Get-ChildItem .\artifacts\Releases -Filter *-Portable.zip | Remove-Item -Force

      - name: Publish update feed
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $feedBranch = "${{ steps.meta.outputs.update_feed_branch }}"
          $feedPath = "${{ steps.meta.outputs.update_feed_path }}"
          $feedRoot = Join-Path $env:RUNNER_TEMP 'update-feed'
          $feedRepoPrefix = "https://x-access-token:$env:GITHUB_TOKEN@github.com/"
          $feedRepoUrl = "${{ steps.meta.outputs.repo_url }}" -replace '^https://github\.com/', $feedRepoPrefix
          $feedFiles = @(Get-ChildItem .\artifacts\Releases -File | Where-Object { $_.Name -notlike '*-Setup.exe' -and $_.Name -ne 'assets.win.json' })

          if ($feedFiles.Count -eq 0) {
            throw 'Unable to find update-feed artifacts to publish.'
          }

          if (Test-Path $feedRoot) {
            Remove-Item $feedRoot -Recurse -Force
          }

          git clone --branch $feedBranch --single-branch $feedRepoUrl $feedRoot *> $null
          if ($LASTEXITCODE -ne 0) {
            if (Test-Path $feedRoot) {
              Remove-Item $feedRoot -Recurse -Force
            }

            New-Item -ItemType Directory -Path $feedRoot -Force | Out-Null
            Push-Location $feedRoot
            git init | Out-Null
            git checkout --orphan $feedBranch | Out-Null
            git remote add origin $feedRepoUrl
            Pop-Location
          }

          $channelDir = Join-Path $feedRoot $feedPath
          if (Test-Path $channelDir) {
            Remove-Item $channelDir -Recurse -Force
          }

          New-Item -ItemType Directory -Path $channelDir -Force | Out-Null
          foreach ($file in $feedFiles) {
            Copy-Item $file.FullName (Join-Path $channelDir $file.Name) -Force
          }

          Push-Location $feedRoot
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add --all $feedPath
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Publish update feed for ${{ steps.meta.outputs.version }}" | Out-Null
            git push origin $feedBranch | Out-Null
          }
          Pop-Location

      - name: Upload Setup.exe to GitHub release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $releaseTag = "v${{ steps.meta.outputs.version }}"
          $setupAsset = Get-ChildItem .\artifacts\Releases -Filter *-Setup.exe | Select-Object -First 1

          if (-not $setupAsset) {
            throw 'Unable to find the generated Setup.exe asset.'
          }

          gh release view $releaseTag --repo "${{ github.repository }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            $createArgs = @(
              'release', 'create', $releaseTag, $setupAsset.FullName,
              '--repo', "${{ github.repository }}",
              '--title', "Pop v${{ steps.meta.outputs.version }}",
              '--target', "${{ github.sha }}"
            )

            if ("${{ steps.meta.outputs.version }}".Contains('-')) {
              $createArgs += '--prerelease'
            }

            & gh @createArgs
          }
          else {
            & gh release upload $releaseTag $setupAsset.FullName --repo "${{ github.repository }}" --clobber
          }

          $releaseData = gh release view $releaseTag --repo "${{ github.repository }}" --json assets | ConvertFrom-Json
          $assetsToDelete = @($releaseData.assets | Where-Object {
            $_.name -ne $setupAsset.Name -and
            $_.name -notlike 'Pop-macos-arm64-*.zip' -and
            $_.name -notlike 'Pop-macos-arm64-*.dmg'
          })
          foreach ($asset in $assetsToDelete) {
            & gh release delete-asset $releaseTag $asset.name --repo "${{ github.repository }}" --yes
          }

      - name: Upload release artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: pop-release
          path: artifacts/Releases/*

  release-macos:
    needs: validate
    if: ${{ needs.validate.outputs.should_release == 'true' }}
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Read release version
        id: meta
        shell: bash
        run: |
          version="$(dotnet msbuild -nologo -getProperty:Version ./src/Pop.App.Mac/Pop.App.Mac.csproj | tail -n 1)"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Test shared .NET suite
        run: dotnet test tests/Pop.Tests/Pop.Tests.csproj --configuration Release

      - name: Make macOS scripts executable
        run: chmod +x ./scripts/build-mac-bridge.sh ./scripts/build-mac-app.sh ./scripts/package-mac-release.sh

      - name: Build macOS bridge
        run: ./scripts/build-mac-bridge.sh

      - name: Test macOS Swift package
        shell: bash
        run: |
          export DYLD_LIBRARY_PATH="$PWD/artifacts/mac/bridge${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}"
          export DYLD_FALLBACK_LIBRARY_PATH="$PWD/artifacts/mac/bridge${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}"
          swift test --package-path src/Pop.App.Mac/NativeHost

      - name: Package macOS app
        id: package
        shell: bash
        run: |
          package_output="$(./scripts/package-mac-release.sh)"
          echo "$package_output"

          zip_path="$(printf '%s\n' "$package_output" | grep '^zip_path=' | tail -n 1 | cut -d= -f2-)"
          dmg_path="$(printf '%s\n' "$package_output" | grep '^dmg_path=' | tail -n 1 | cut -d= -f2-)"

          if [[ -z "$zip_path" || -z "$dmg_path" ]]; then
            echo "Unable to read macOS package output paths." >&2
            exit 1
          fi

          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"
          echo "dmg_path=$dmg_path" >> "$GITHUB_OUTPUT"

      - name: Upload macOS assets to GitHub release
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="v${{ steps.meta.outputs.version }}"
          zip_asset="${{ steps.package.outputs.zip_path }}"
          dmg_asset="${{ steps.package.outputs.dmg_path }}"

          if [[ ! -f "$zip_asset" ]]; then
            echo "Unable to find the generated macOS zip asset." >&2
            exit 1
          fi

          if [[ ! -f "$dmg_asset" ]]; then
            echo "Unable to find the generated macOS dmg asset." >&2
            exit 1
          fi

          if gh release view "$release_tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release upload "$release_tag" "$zip_asset" "$dmg_asset" --repo "${{ github.repository }}" --clobber
          else
            create_args=(
              release create "$release_tag" "$zip_asset" "$dmg_asset"
              --repo "${{ github.repository }}"
              --title "Pop v${{ steps.meta.outputs.version }}"
              --target "${{ github.sha }}"
            )

            if [[ "${{ steps.meta.outputs.version }}" == *-* ]]; then
              create_args+=(--prerelease)
            fi

            if ! gh "${create_args[@]}"; then
              gh release upload "$release_tag" "$zip_asset" "$dmg_asset" --repo "${{ github.repository }}" --clobber
            fi
          fi

          release_json="$(gh release view "$release_tag" --repo "${{ github.repository }}" --json assets)"
          python3 - "$release_json" "$release_tag" "${{ github.repository }}" "$(basename "$zip_asset")" "$(basename "$dmg_asset")" <<'PY'
          import json
          import subprocess
          import sys

          release = json.loads(sys.argv[1])
          release_tag = sys.argv[2]
          repo = sys.argv[3]
          keep_assets = {sys.argv[4], sys.argv[5]}

          for asset in release.get("assets", []):
              name = asset.get("name", "")
              if name in keep_assets or name.endswith("-Setup.exe"):
                  continue

              subprocess.run(
                  ["gh", "release", "delete-asset", release_tag, name, "--repo", repo, "--yes"],
                  check=True,
              )
          PY

      - name: Upload macOS release artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@v6
        with:
          name: pop-release-macos
          path: artifacts/mac/release/*
